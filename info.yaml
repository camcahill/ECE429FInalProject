# Tiny Tapeout project information
project:
  title: "Analog Clock Controller"
  author: "Cameron Cahill"
  discord: "IsopteraCrwl"
  description: "A digital analog clock controller that tracks seconds, minutes, hours, and AM/PM status using all 8 TinyTapeout input pins and all 8 output pins."
  language: "Verilog"
  clock_hz: 1
  tiles: "1x1"

  top_module: "tt_um_camcahill_analog_clock"

  source_files:
    - "project.v"

# The pinout of your project.
pinout:
  # Inputs
  ui[0]: "Set mode"
  ui[1]: "Increment hour"
  ui[2]: "Increment minute"
  ui[3]: "Pause clock"
  ui[4]: "Output select bit 0"
  ui[5]: "Output select bit 1"
  ui[6]: "Toggle AM/PM"
  ui[7]: "Clear seconds"

  # Outputs
  uo[0]: "Selected output bit 0"
  uo[1]: "Selected output bit 1"
  uo[2]: "Selected output bit 2"
  uo[3]: "Selected output bit 3"
  uo[4]: "Selected output bit 4"
  uo[5]: "Selected output bit 5"
  uo[6]: "Selected output bit 6"
  uo[7]: "Selected output bit 7"

  # Bidirectional pins used as outputs
  uio[0]: "Valid/status bit"
  uio[1]: "AM/PM status"
  uio[2]: "Set mode status"
  uio[3]: "Pause status"
  uio[4]: "Increment hour status"
  uio[5]: "Increment minute status"
  uio[6]: "Toggle AM/PM status"
  uio[7]: "Clear seconds status"

# Do not change!
yaml_version: 6
